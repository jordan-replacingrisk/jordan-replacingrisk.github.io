<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1, 5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  const hotspotObjects = [];

  // Example hotspot marker
  const hotspotGeometry = new THREE.SphereGeometry(0.05, 16, 16);
  const hotspotMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });

  const hotspot1 = new THREE.Mesh(hotspotGeometry, hotspotMaterial);
  hotspot1.position.set(0, 1, 0);
  hotspot1.userData = {
    title: 'Front Bracket',
    description: 'This is the front bracket area.'
  };

  scene.add(hotspot1);
  hotspotObjects.push(hotspot1);

  const loader = new GLTFLoader();
  loader.load('./Braces.glb', function (gltf) {
    scene.add(gltf.scene);
  });

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(hotspotObjects);

    if (intersects.length > 0) {
      const hotspot = intersects[0].object;

      alert(
        hotspot.userData.title + '\n\n' +
        hotspot.userData.description
      );
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>
