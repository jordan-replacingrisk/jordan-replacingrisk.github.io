<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Braces GLB Viewer with Hotspot</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #infoBox {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
      max-width: 250px;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="infoBox"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const hotspotObjects = [];
    const infoBox = document.getElementById('infoBox');

    const hotspotGeometry = new THREE.SphereGeometry(0.15, 32, 32);
    const hotspotMaterial = new THREE.MeshStandardMaterial({
      color: 0xff0000,
      emissive: 0xff0000,
      emissiveIntensity: 2
    });

    const hotspot = new THREE.Mesh(hotspotGeometry, hotspotMaterial);
    hotspot.position.set(0, 1, 1);

    hotspot.userData = {
      title: 'Front Bracket',
      description: 'This hotspot highlights the front bracket area of the braces model.'
    };

    scene.add(hotspot);
    hotspotObjects.push(hotspot);

    const loader = new GLTFLoader();

    loader.load(
      './Braces.glb',
      function (gltf) {
        const model = gltf.scene;
        scene.add(model);
      },
      undefined,
      function (error) {
        console.error('Error loading GLB model:', error);
      }
    );

    window.addEventListener('click', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(hotspotObjects);

      if (intersects.length > 0) {
        const clickedHotspot = intersects[0].object;

        infoBox.innerHTML = `
          <strong>${clickedHotspot.userData.title}</strong><br><br>
          ${clickedHotspot.userData.description}
        `;

        infoBox.style.display = 'block';
      } else {
        infoBox.style.display = 'none';
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      const scale = 1 + Math.sin(Date.now() * 0.005) * 0.15;
      hotspot.scale.set(scale, scale, scale);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
